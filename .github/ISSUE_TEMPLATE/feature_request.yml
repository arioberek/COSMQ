name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should COSMQ solve?
      placeholder: "I want to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, or developer workflow you want.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Area
      options:
        - Mobile app
        - Landing site
        - Database protocol
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or related tools if relevant.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, links, or constraints.
